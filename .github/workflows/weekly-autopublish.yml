# 北京时间每周一 10:00：骨架 → RSS 摘录 → AI 填稿（需 Secret）→ build → push → Vercel
# 依赖：Settings → Actions → Workflow permissions → Read and write permissions
# 满篇干货：Secrets 配 ANTHROPIC_API_KEY，或 OPENAI_API_KEY（国内可用 DeepSeek，见 config/weekly-fill.json 说明）

name: Weekly skeleton and publish

on:
  schedule:
    # 北京时间周一 10:00（主）+ 12:00 / 14:00（备用，GitHub schedule 偶发漏跑）
    - cron: "0 10 * * 1"
      timezone: Asia/Shanghai
    - cron: "0 12 * * 1"
      timezone: Asia/Shanghai
    - cron: "0 14 * * 1"
      timezone: Asia/Shanghai
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: weekly-autopublish
  cancel-in-progress: true

jobs:
  weekly:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create weekly skeleton
        env:
          SKIP_BUILD: "1"
        run: node scripts/create-weekly-report.mjs

      - name: Append RSS digest
        env:
          SKIP_BUILD: "1"
        run: node scripts/append-weekly-digest.mjs

      - name: AI fill sections 1-10
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
        run: node scripts/fill-weekly-content.mjs

      - name: Build site
        run: npm run build

      - name: Commit and push if changed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore(weekly): digest + AI draft $(date -u +%Y-%m-%dT%H:%MZ)"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:main"
