# 一键强制按七板块重写当周有内容的板块，无需找下拉选项。
# 用法：Actions → 左侧点本工作流 → Run workflow

name: Force AI refill (当前周报)

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: weekly-autopublish
  cancel-in-progress: true

jobs:
  weekly:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create weekly skeleton
        env:
          SKIP_BUILD: "1"
        run: node scripts/create-weekly-report.mjs

      - name: Append RSS digest
        env:
          SKIP_BUILD: "1"
        run: node scripts/append-weekly-digest.mjs

      - name: Fill concise business sections (force overwrite)
        env:
          CI: "true"
          FORCE_WEEKLY_FILL: "true"
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
        run: node scripts/fill-weekly-content.mjs

      - name: Validate weekly report is publishable
        run: node scripts/validate-weekly-content.mjs

      - name: Build site
        run: npm run build

      - name: Commit and push if changed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore(weekly): force AI refill $(date -u +%Y-%m-%dT%H:%MZ)"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:main"
