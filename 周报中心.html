  <script type="application/json" id="weekly-data">[{"title":"2026-W29-周报","href":"weekly-html/2026-W29-周报.html","summary":"\u003cstrong>国门学校优秀青年教师培养支持计划正式启动实施\u003c/strong>：教师培养支持计划面向边境地区学校启动，说明薄弱地区师资建设仍是基础教育政策重点，相关培训和资源服务应按官方口径对接。\u003ca href=\"https://www.moe.gov.cn/jyb_xwfb/gzdt_gzdt/moe_1485/202607/t20260719_1444325.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>","tags":"policy platform k12","sections":[{"heading":"一、K12教育政策全国盘点","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>国门学校优秀青年教师培养支持计划正式启动实施\u003c/strong>：教师培养支持计划面向边境地区学校启动，说明薄弱地区师资建设仍是基础教育政策重点，相关培训和资源服务应按官方口径对接。\u003ca href=\"https://www.moe.gov.cn/jyb_xwfb/gzdt_gzdt/moe_1485/202607/t20260719_1444325.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>山西下达44亿元发展城乡义务教育\u003c/strong>：省级财政继续加码城乡义务教育经费保障，学校基础条件、资源供给和薄弱地区支持仍是 K12 政策跟踪重点。\u003ca href=\"https://paper.jyb.cn/zgjyb/html/2026-07/15/content_144740_19704291.htm\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>北京推动大中小学思政教育一体化建设\u003c/strong>：北京市推进不同学段思政教育贯通，K12 内容产品和校内资源服务需要注意学段衔接与官方课程口径。\u003ca href=\"https://paper.jyb.cn/zgjyb/html/2026-07/15/content_144740_19704290.htm\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>高招录取查询与征集志愿\u003c/strong>：录取期服务重点从志愿填报转向录取状态查询、征集志愿提醒、退档原因说明和通知书防伪，所有查询入口应指向官方平台。\u003ca href=\"https://gaokao.chsi.com.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>暑期校外培训监管查询\u003c/strong>：暑期教辅配套服务、训练营、AI 诊断和社群答疑需要与学科培训边界区分清楚，家长侧可通过全国监管平台核验机构和课程信息。\u003ca href=\"https://xwpx.eduyun.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>国家智慧教育平台暑期资源\u003c/strong>：暑期学习、阅读、作业辅导和数字化学习服务应优先引用官方可核验资源，减少不明来源题库和资料包。\u003ca href=\"https://www.smartedu.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"},{"heading":"三、出版社/教辅公司出版及数智化最新动态","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>猿辅导AI大阅读正式发布\u003c/strong>：猿辅导围绕青少年阅读能力培养推出垂类AI方案，强调沉浸式场景、思辨问答和实体图书结合，阅读类教辅正在从纸书配套走向“内容+AI陪伴+表达反馈”。\u003ca href=\"https://www.ithome.com/0/977/011.htm\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>人教版义教新教材网络培训开放报名\u003c/strong>：2026年秋季学期人教版义教新教材网络培训于7月15日至19日实名注册报名、7月20日起开播，出版社配套服务重点转向教材解读、教学指导、学时统计和回放补学。\u003ca href=\"http://t.pep.com.cn/xjcq2026\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>国家智慧教育平台全面深化应用试点推进会召开\u003c/strong>：教育部推进国家智慧教育平台深化应用试点，数字资源、题库和学习工具需要围绕官方平台应用、资源审核和区域试点更新产品口径。\u003ca href=\"https://www.moe.gov.cn/jyb_xwfb/gzdt_gzdt/moe_1485/202607/t20260718_1444258.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>东方激光发布2027版上海高考零距离多学科改版图书\u003c/strong>：上海高考区域教辅进入新版迭代期，物理、化学、历史、数学等学科产品需要同步更新内容、题型和配套服务。\u003ca href=\"https://www.dfjgedu.com/News/List?newsCategoryId=22\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>志愿类内容转向录取期工具\u003c/strong>：高考志愿类产品应补充录取状态解释、征集志愿提醒、退档原因说明和通知书防伪清单，减少预测录取类表达。\u003ca href=\"https://gaokao.chsi.com.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>数字学习资源优先接入官方入口\u003c/strong>：暑期阅读、错题复盘、单元诊断和学习计划类产品，应优先使用可核验资源入口，并保留人工审校和纠错机制。\u003ca href=\"https://www.smartedu.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"},{"heading":"六、新闻评论/专家专栏评教辅行业","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>同步教辅印刷的行业门槛与能力构建\u003c/strong>：产业观察文章认为同步教辅对印刷企业的质量管控、产能调度和数字化能力提出更高要求，教辅供应链需要从低价交付转向稳定合规交付。\u003ca href=\"https://www.xinyumedia.com.cn/insight/1492.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"}]},{"title":"2026-W28-周报","href":"weekly-html/2026-W28-周报.html","summary":"\u003cstrong>高招服务转入录取查询阶段\u003c/strong>：志愿服务重点从填报操作转向录取状态、征集志愿、退档原因和通知书防伪，所有入口应指向官方平台。\u003ca href=\"https://gaokao.chsi.com.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>","tags":"policy expo platform k12","sections":[{"heading":"一、K12教育政策全国盘点","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>高招服务转入录取查询阶段\u003c/strong>：志愿服务重点从填报操作转向录取状态、征集志愿、退档原因和通知书防伪，所有入口应指向官方平台。\u003ca href=\"https://gaokao.chsi.com.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>暑期校外培训监管查询\u003c/strong>：暑期训练营、AI 自习、督学答疑和教辅配套服务需要与学科培训区分清楚，家长可通过监管平台核验机构信息。\u003ca href=\"https://xwpx.eduyun.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>省级录取查询入口优先\u003c/strong>：录取结果、征集志愿和投档信息应以省级教育考试院、阳光高考和高校招生网为准，第三方平台只做提醒和解释。\u003ca href=\"https://www.jseea.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>义务招生结果阶段服务\u003c/strong>：郑州、深圳等地招生进入录取确认、统筹安排和材料复核阶段，区域内容应做官方链接导航和入学准备清单。\u003ca href=\"https://zzjy.zhengzhou.gov.cn/wjtz/10061033.jhtml\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"},{"heading":"二、K12教辅政策全国盘点","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>湖南发布2026年中小学教辅材料评议目录\u003c/strong>：湖南省中小学教辅材料评议委员会发布2026年评议目录，明确封面标识、审图号、商业广告链接、课前到书、7月底前完成市州选用等要求，目录准入和发行合规继续收紧。\u003ca href=\"https://www.hnedutv.com/content/17304660\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>北京印发高中阶段教辅材料评议推荐目录\u003c/strong>：北京市教委明确2026年秋季学期起高中阶段进校教辅应按程序从《评议目录》内选用，学校不得强制订购或允许单位个人进校宣传推销教辅。\u003ca href=\"https://jw.beijing.gov.cn/xxgk/2024zcwj/2024qtwj/202607/t20260709_4754129.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>暑期教辅配套服务合规边界\u003c/strong>：暑假作业、衔接一本通、错题诊断和直播答疑可以作为学习辅助，但不得承诺提分、保录或暗示入学资格。\u003ca href=\"https://xwpx.eduyun.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"},{"heading":"三、出版社/教辅公司出版及数智化最新动态","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>中国教育出版传媒集团参加第35届国际出版商大会\u003c/strong>：集团在国际出版商大会介绍“数智化、国际化”双轮驱动战略和AI赋能教育出版实践，教育出版的AI应用、版权保护和国际合作成为重点议题。\u003ca href=\"https://www.cbbr.com.cn/contents/533/110763.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>志愿类内容升级为录取期工具\u003c/strong>：志愿指南和小程序应补充录取状态词典、征集志愿提醒、退档案例解释和官方入口聚合。\u003ca href=\"https://gaokao.chsi.com.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>数字学习资源进入暑期高频使用期\u003c/strong>：阅读、错题、复习计划和学习诊断类产品应优先引用官方可核验资源，并保留人工审校和纠错机制。\u003ca href=\"https://www.smartedu.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"},{"heading":"五、出版社/教辅公司与科技公司深度合作","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>北京西城发布多项“教育+AI”创新成果\u003c/strong>：西城区在“教育+AI”专题论坛发布教育智能体生态、体质体态AI评测平台、青少年人工智能安全培养基地等成果，并推动学校、高校与科技企业签约共建。\u003ca href=\"https://bj.people.com.cn/n2/2026/0712/c82838-41636510.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"}]},{"title":"2026-W27-周报","href":"weekly-html/2026-W27-周报.html","summary":"\u003cstrong>教育部部署2026年中小学、幼儿园暑期安全工作\u003c/strong>：通知要求严格作业考试管理、规范办学行为、全面落实招生入学政策，并明确保障教师休息权益，暑期教辅服务和家长沟通口径需同步收紧。\u003ca href=\"https://www.moe.gov.cn/jyb_xwfb/gzdt_gzdt/s5987/202607/t20260701_1442267.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>","tags":"policy platform k12","sections":[{"heading":"一、K12教育政策全国盘点","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>教育部部署2026年中小学、幼儿园暑期安全工作\u003c/strong>：通知要求严格作业考试管理、规范办学行为、全面落实招生入学政策，并明确保障教师休息权益，暑期教辅服务和家长沟通口径需同步收紧。\u003ca href=\"https://www.moe.gov.cn/jyb_xwfb/gzdt_gzdt/s5987/202607/t20260701_1442267.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>江苏志愿正式填报进入关键期\u003c/strong>：江苏本科院校专业组志愿填报进入核心操作窗口，省版志愿指南、专业组速查和客服 FAQ 需要每日同步官方规则。\u003ca href=\"https://www.jseea.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>阳光高考平台承接正式填报服务\u003c/strong>：院校招生章程、专业信息、咨询答疑和官方提醒应作为志愿类内容的基础入口。\u003ca href=\"https://gaokao.chsi.com.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>郑州派位后进入结果解释阶段\u003c/strong>：民办初中派位结果公布后，家长关注录取确认、未派中衔接和后续入学安排，内容应统一指向教育局公告。\u003ca href=\"https://zzjy.zhengzhou.gov.cn/wjtz/10061033.jhtml\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>深圳龙华招生审核收尾\u003c/strong>：龙华义务招生初审和复核节点推动材料补正、学位类型解释和录取时间查询需求上升。\u003ca href=\"https://www.sz.gov.cn/school/tzgg/content/post_12826935.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"},{"heading":"二、K12教辅政策全国盘点","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>教育部要求暑期排查校园教辅突出问题\u003c/strong>：暑期安全工作部署把校园餐、教辅、校服突出问题排查和整改纳入“三项整治”巩固内容，教辅进校、征订和发放链路需要保留资质、采购、发放等关键环节记录。\u003ca href=\"https://www.moe.gov.cn/jyb_xwfb/gzdt_gzdt/s5987/202607/t20260701_1442267.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>暑期教辅服务合规边界\u003c/strong>：暑假衔接、督学打卡、AI 诊断和线上答疑应明确图书资料、数字服务和培训服务的区别。\u003ca href=\"https://xwpx.eduyun.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>志愿类产品进入敏感高峰\u003c/strong>：志愿指南、数据卡、直播咨询和 AI 建议必须删除保录、内部指标、精准预测和官方合作暗示。\u003ca href=\"http://www.moe.gov.cn/jyb_xwfb/gzdt_gzdt/s5987/202606/t20260602_1438553.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"},{"heading":"三、出版社/教辅公司出版及数智化最新动态","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>学而思发布培优AI家教及T6系列学习机\u003c/strong>：新品将AI诊断规划、互动课堂、原版英语内容和护眼硬件整合进家庭学习场景，学习机竞争继续从硬件参数转向内容教研与AI个性化服务能力。\u003ca href=\"https://www.xinhuanet.com/tech/20260702/6c2507bdbcad455881a639682237c0fc/c.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>志愿产品进入省别规则维护期\u003c/strong>：院校库、专业库、历年录取数据和 AI 问答应按省份更新，并提示所有结果以省考试院和高校招生网为准。\u003ca href=\"https://gaokao.chsi.com.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>暑期数字资源进入家庭学习场景\u003c/strong>：阅读打卡、错题复盘和学习计划类服务应优先接入官方可核验资源，并保留人工审校与纠错机制。\u003ca href=\"https://www.smartedu.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"},{"heading":"五、出版社/教辅公司与科技公司深度合作","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>科大讯飞AI学习机T90暑期功能升级\u003c/strong>：科大讯飞学习机围绕自主预习、查漏补缺、作业答疑和素养拓展发布T90相关升级，暑期学习硬件继续强化“AI个性化精准学”定位。\u003ca href=\"https://www.sina.cn/news/detail/5315932369194643.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>志愿信息服务商合作需核验数据\u003c/strong>：教辅公司与院校库、职业测评和 AI 问答平台合作前，应检查数据来源、更新时间、免责声明和用户隐私条款。\u003ca href=\"https://gaokao.chsi.com.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"},{"heading":"七、教育教辅政策解读文章","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>录取与退档风险解读需求上升\u003c/strong>：正式填报后，用户开始关注投档规则、专业调剂、退档风险和征集志愿，内容应回到官方章程和考试院口径。\u003ca href=\"https://gaokao.chsi.com.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"}]},{"title":"2026-W26-周报","href":"weekly-html/2026-W26-周报.html","summary":"\u003cstrong>BIBF 2026 在北京举办\u003c/strong>：北京国际图书博览会集中展示版权、少儿绘本、网络出版和 AI 方案，出版机构可将会后线索转入暑期和书博会筹备。\u003ca href=\"https://www.beijing.gov.cn/fuwu/bmfw/sy/jrts/202606/t20260611_4695462.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>","tags":"policy expo platform k12","sections":[{"heading":"一、K12教育政策全国盘点","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>BIBF 2026 在北京举办\u003c/strong>：北京国际图书博览会集中展示版权、少儿绘本、网络出版和 AI 方案，出版机构可将会后线索转入暑期和书博会筹备。\u003ca href=\"https://www.beijing.gov.cn/fuwu/bmfw/sy/jrts/202606/t20260611_4695462.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>高招志愿进入分省填报高峰\u003c/strong>：各省考试院和阳光高考承接查分、志愿填报、招生章程和咨询服务，教辅内容必须按省份拆分规则。\u003ca href=\"https://gaokao.chsi.com.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>郑州民办初中派位节点临近\u003c/strong>：郑州民办初中电脑派位相关安排带动家长对录取结果、公办衔接和材料确认的咨询需求。\u003ca href=\"https://zzjy.zhengzhou.gov.cn/wjtz/10061033.jhtml\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>深圳龙华进入材料审核阶段\u003c/strong>：报名后家长关注学校初审、复核和录取安排，区域 FAQ 应只做官方流程解释。\u003ca href=\"https://www.sz.gov.cn/school/tzgg/content/post_12826935.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"},{"heading":"二、K12教辅政策全国盘点","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>阳光招生继续约束招生宣传\u003c/strong>：义务招生、普通高中招生和高招志愿内容都应避免内部名额、择校捷径和高价咨询暗示。\u003ca href=\"http://www.moe.gov.cn/srcsite/A06/s3321/202604/t20260403_1432844.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>展会品种不等于可进校\u003c/strong>：BIBF 展示、馆配洽谈和电商热销不能替代地方教辅评议目录和学校采购流程。\u003ca href=\"https://www.beijing.gov.cn/fuwu/bmfw/sy/jrts/202606/t20260611_4695462.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"},{"heading":"三、出版社/教辅公司出版及数智化最新动态","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>省级考试院平台访问高峰\u003c/strong>：志愿类数字产品要聚合官方入口、提醒填报节点并说明辅助属性，不应仿冒考试院页面或截留账号信息。\u003ca href=\"https://www.jseea.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>BIBF 网络出版馆提供数字合作样本\u003c/strong>：网络出版联合展台、IP 授权专区和 AI 解决方案为 K12 阅读、数字内容和纸数融合合作提供线索。\u003ca href=\"https://www.beijing.gov.cn/fuwu/bmfw/sy/jrts/202606/t20260611_4695462.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>暑期数字资源转入家庭使用场景\u003c/strong>：阅读打卡、错题复盘、学习计划和教师资源应优先使用官方可核验内容，并保留人工审核机制。\u003ca href=\"https://www.smartedu.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"},{"heading":"五、出版社/教辅公司与科技公司深度合作","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>出版与 IP 授权合作进入筛选期\u003c/strong>：BIBF 的绘本、文博、动漫和网络出版 IP 可用于少儿阅读和主题阅读，但需完成版权、适龄和内容审校。\u003ca href=\"https://www.beijing.gov.cn/fuwu/bmfw/sy/jrts/202606/t20260611_4695462.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>志愿填报 SaaS 合作需守辅助边界\u003c/strong>：院校库、专业库和职业测评平台可与纸质志愿指南联动，但不得包装成官方填报建议或录取承诺。\u003ca href=\"https://gaokao.chsi.com.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"},{"heading":"七、教育教辅政策解读文章","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>高招填报规则需要分省说明\u003c/strong>：不同省份批次、专业组和志愿模式差异明显，内容产品应以省级考试院公告为解释基础。\u003ca href=\"https://www.jseea.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"}]},{"title":"2026-W25-周报","href":"weekly-html/2026-W25-周报.html","summary":"\u003cstrong>江苏高考志愿填报安排公布\u003c/strong>：江苏明确模拟填报、正式填报和院校专业组模式，省版志愿指南和 FAQ 需要独立维护。\u003ca href=\"https://finance.sina.com.cn/wm/2026-06-11/doc-iniazpqr4015911.shtml\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>","tags":"policy platform k12","sections":[{"heading":"一、K12教育政策全国盘点","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>江苏高考志愿填报安排公布\u003c/strong>：江苏明确模拟填报、正式填报和院校专业组模式，省版志愿指南和 FAQ 需要独立维护。\u003ca href=\"https://finance.sina.com.cn/wm/2026-06-11/doc-iniazpqr4015911.shtml\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>多省进入考后志愿关键周\u003c/strong>：宁夏、河南、四川等省份志愿节点临近，分省时间表和官方入口维护成为志愿内容重点。\u003ca href=\"https://www.gaodun.com/news/1763517.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>深圳龙华报名进入收官阶段\u003c/strong>：义务段网上报名结束前，家长服务重点是材料补正、志愿确认和后续审核节点提醒。\u003ca href=\"https://www.sz.gov.cn/school/tzgg/content/post_12826935.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>学前教育宣传月收官\u003c/strong>：宣传月临近结束，园所案例、亲子阅读和家园共育内容需要完成复盘并避免商业搭车。\u003ca href=\"http://www.moe.gov.cn/srcsite/A06/s3327/202604/t20260420_1434185.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"},{"heading":"二、K12教辅政策全国盘点","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>阳光招生专项行动持续执行\u003c/strong>：义务教育免试就近、普通高中属地招生和严禁择校费等要求继续约束招生季教辅营销。\u003ca href=\"http://www.moe.gov.cn/srcsite/A06/s3321/202604/t20260403_1432844.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>志愿产品不得承诺录取\u003c/strong>：志愿指南、直播咨询和数据卡应强调参考属性，不得使用保录、内部指标、精准预测等话术。\u003ca href=\"http://www.moe.gov.cn/jyb_xwfb/gzdt_gzdt/s5987/202606/t20260602_1438553.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"},{"heading":"三、出版社/教辅公司出版及数智化最新动态","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>江苏模拟填报带动省版工具需求\u003c/strong>：院校专业组、选考科目、批次规则和动态口令等流程需要在小程序、书籍和客服脚本中同步更新。\u003ca href=\"https://finance.sina.com.cn/wm/2026-06-11/doc-iniazpqr4015911.shtml\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>志愿工具需要明确辅助定位\u003c/strong>：志愿小程序、院校库和专业测评工具应标明数据来源和更新时间，避免“精准预测”“保录”等承诺。\u003ca href=\"https://gaokao.chsi.com.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>暑期数字资源开始预热\u003c/strong>：阅读、复习、错题和学习计划类产品应优先接入国家智慧教育平台等官方资源，减少不明来源资料包。\u003ca href=\"https://www.smartedu.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"},{"heading":"七、教育教辅政策解读文章","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>志愿时间表解读需求上升\u003c/strong>：多省填报节点密集，家长和考生更需要分省解释批次、截止时间和官方系统入口。\u003ca href=\"https://www.gaodun.com/news/1763517.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"}]},{"title":"2026-W24-周报","href":"weekly-html/2026-W24-周报.html","summary":"\u003cstrong>全国高考平稳举行\u003c/strong>：2026 年高考进入考务和考后服务阶段，查分、志愿和防诈骗内容应统一引用官方平台。\u003ca href=\"http://www.news.cn/edu/20260605/98f91d1540c8483cbea70c5a4764d8d8/c.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>","tags":"policy platform k12","sections":[{"heading":"一、K12教育政策全国盘点","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>全国高考平稳举行\u003c/strong>：2026 年高考进入考务和考后服务阶段，查分、志愿和防诈骗内容应统一引用官方平台。\u003ca href=\"http://www.news.cn/edu/20260605/98f91d1540c8483cbea70c5a4764d8d8/c.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>高考十问十答发布\u003c/strong>：问答明确智能设备、押题谣言、查分渠道和志愿服务注意事项，考后内容应统一引用权威口径。\u003ca href=\"https://www.163.com/dy/article/KULQ8IJL05346RC6.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>深圳龙华义务报名进入窗口\u003c/strong>：小一和初一网上报名启动，家长关注点集中在招生范围、学位类型、材料上传和后续初审。\u003ca href=\"https://www.sz.gov.cn/school/tzgg/content/post_12826935.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>郑州民办初中派位节点临近\u003c/strong>：郑州民办初中电脑派位相关安排带动家长对志愿确认、录取结果和公办衔接的咨询需求。\u003ca href=\"https://zzjy.zhengzhou.gov.cn/wjtz/10061033.jhtml\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"},{"heading":"二、K12教辅政策全国盘点","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>涉考教辅营销进入高压期\u003c/strong>：高考护航行动要求治理押题、泄题、助考中介和虚假查分，冲刺卷、估分卷和志愿资料宣传要清理高风险话术。\u003ca href=\"http://www.moe.gov.cn/jyb_xwfb/gzdt_gzdt/s5987/202606/t20260602_1438553.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>义务招生内容不得暗示择校\u003c/strong>：深圳、郑州等招生节点叠加，区域教辅和家长社群内容应只做政策解释、材料清单和官方链接导航。\u003ca href=\"https://www.sz.gov.cn/school/tzgg/content/post_12826935.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"},{"heading":"三、出版社/教辅公司出版及数智化最新动态","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>志愿服务系统升级预期\u003c/strong>：官方阳光志愿和省级平台将承接考后服务，第三方志愿工具应标注辅助定位和数据更新时间。\u003ca href=\"http://www.moe.gov.cn/jyb_xwfb/gzdt_gzdt/s5987/202606/t20260602_1438553.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>专业目录更新带动内容改版\u003c/strong>：新增专业和大类招生调整要求志愿指南、专业百科和职业规划产品及时更新版本。\u003ca href=\"http://www.news.cn/edu/20260605/98f91d1540c8483cbea70c5a4764d8d8/c.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>教育科学规划申报开启\u003c/strong>：年度项目申报系统开放，教育数字化、AI 教育和教研资源建设可作为研究与合作方向。\u003ca href=\"https://rwsk.zju.edu.cn/2026/0601/c28727a3168581/page.htm\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"},{"heading":"七、教育教辅政策解读文章","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>高考问答释疑\u003c/strong>：权威问答对考场纪律、查分渠道、志愿服务和诈骗防范进行说明，可直接转化为考后 FAQ。\u003ca href=\"https://www.163.com/dy/article/KULQ8IJL05346RC6.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"}]},{"title":"2026-W23-周报","href":"weekly-html/2026-W23-周报.html","summary":"\u003cstrong>2026 年高考护航行动启动\u003c/strong>：教育部会同有关部门强化考试安全、涉考诈骗治理和志愿填报服务，教辅和自媒体内容不得使用押题、泄题、内部渠道等表述。\u003ca href=\"http://www.moe.gov.cn/jyb_xwfb/gzdt_gzdt/s5987/202606/t20260602_1438553.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>","tags":"policy platform k12","sections":[{"heading":"一、K12教育政策全国盘点","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>2026 年高考护航行动启动\u003c/strong>：教育部会同有关部门强化考试安全、涉考诈骗治理和志愿填报服务，教辅和自媒体内容不得使用押题、泄题、内部渠道等表述。\u003ca href=\"http://www.moe.gov.cn/jyb_xwfb/gzdt_gzdt/s5987/202606/t20260602_1438553.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>高招专业调整带动升学内容更新\u003c/strong>：高校专业设置和招生变化推动志愿指南、专业百科和生涯规划内容更新，新增专业解释要与官方口径一致。\u003ca href=\"http://www.news.cn/edu/20260605/98f91d1540c8483cbea70c5a4764d8d8/c.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>深圳龙华义务招生通知发布\u003c/strong>：龙华区小一和初一报名安排明确，区域招生 FAQ 应围绕招生范围、材料清单、初审复核和录取节点更新。\u003ca href=\"https://www.sz.gov.cn/school/tzgg/content/post_12826935.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>深圳外国语学校招生调整\u003c/strong>：深外初中部取消英语特色招生并保留小语种招生，特色招生内容应对齐阳光招生和备案要求。\u003ca href=\"https://news.qq.com/rain/a/20260526A0589G00\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"},{"heading":"二、K12教辅政策全国盘点","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>省级教辅评议进入目录窗口\u003c/strong>：福建、湖南、吉林等地评议信息提示，进校征订应以省级推荐目录和出版资质为依据。\u003ca href=\"https://jyt.fujian.gov.cn/xxgk/gggs/202604/t20260415_7125019.htm\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>同步练习授权要求需核查\u003c/strong>：教辅送评和目录更新阶段，同步练习类产品应核验教材著作权授权、书号和出版资质。\u003ca href=\"https://jyt.hunan.gov.cn/jyt/sjyt/xxgk/tzgg/202604/t20260408_1175938.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"},{"heading":"三、出版社/教辅公司出版及数智化最新动态","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>阳光志愿服务升级\u003c/strong>：高考护航行动提出优化志愿填报服务，第三方志愿工具应定位为信息整理和辅助解释，不得替代官方填报系统。\u003ca href=\"http://www.moe.gov.cn/jyb_xwfb/gzdt_gzdt/s5987/202606/t20260602_1438553.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>招生平台 FAQ 共建需求上升\u003c/strong>：北京、深圳等招生节点叠加，平台服务可围绕官方入口、材料清单和政策提醒展开。\u003ca href=\"https://yjrx.bjedu.cn\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"},{"heading":"七、教育教辅政策解读文章","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>高考十问十答\u003c/strong>：高考问答明确智能设备、押题谣言、查分渠道和志愿服务注意事项，考后内容应统一引用官方和权威媒体口径。\u003ca href=\"https://www.163.com/dy/article/KULQ8IJL05346RC6.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>高招制度变化专家解读\u003c/strong>：专家解读聚焦专业设置、招生制度和考生选择，适合转化为志愿指南的专业说明和风险提示。\u003ca href=\"https://app.xinhuanet.com/news/article.html?articleId=ab6edda4bee1e5ce1a0e7a3bcc7c11a9\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"}]},{"title":"2026-W22-周报","href":"weekly-html/2026-W22-周报.html","summary":"\u003cstrong>深圳福田幼儿园集中招生\u003c/strong>：福田区幼儿园报名进入网上办理窗口，入园 FAQ 应围绕报名入口、材料核验、录取查询和官方公告更新。\u003ca href=\"https://www.szft.gov.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>","tags":"policy platform k12","sections":[{"heading":"一、K12教育政策全国盘点","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>深圳福田幼儿园集中招生\u003c/strong>：福田区幼儿园报名进入网上办理窗口，入园 FAQ 应围绕报名入口、材料核验、录取查询和官方公告更新。\u003ca href=\"https://www.szft.gov.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>北京义务教育信息采集收官\u003c/strong>：北京入学信息采集进入月底收口阶段，家长服务内容应避免非官方入口和保录、择校暗示。\u003ca href=\"https://yjrx.bjedu.cn\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>上海入园入学线上办理\u003c/strong>：上海入园和入学办理继续依托政务服务入口，渠道侧应提供官方路径导航而不是替代办理服务。\u003ca href=\"https://zwdt.sh.gov.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>南京热点校派位节点临近\u003c/strong>：南京义务招生安排进入报名和派位准备期，区域内容应围绕官方时间表和派位规则说明。\u003ca href=\"https://www.nanjing.gov.cn/zgnjsjb/jrtt/202604/t20260430_5832758.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"},{"heading":"二、K12教辅政策全国盘点","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>学前宣传月禁止商业搭车\u003c/strong>：幼教、亲子阅读和数字产品可以配合科普，但不能借宣传月名义做商业推销。\u003ca href=\"http://www.moe.gov.cn/srcsite/A06/s3327/202604/t20260420_1434185.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>阳光招生与教辅推广隔离\u003c/strong>：招生季内容应提供官方链接、材料清单和咨询电话，不应把购买教辅包装成入学优势。\u003ca href=\"http://www.moe.gov.cn/srcsite/A06/s3321/202604/t20260403_1432844.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"},{"heading":"三、出版社/教辅公司出版及数智化最新动态","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>入园入学 FAQ 数字化需求上升\u003c/strong>：政务平台流量集中后，区县教育局专栏、客服脚本和官方链接导航成为可合作的轻量服务。\u003ca href=\"https://zwdt.sh.gov.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>幼教数字内容需强调适龄保护\u003c/strong>：宣传月报道提醒防止“电子带娃”，低龄数字资源应增加适龄提示、家长监护和内容审核说明。\u003ca href=\"https://www.xinhuanet.com/20260519/808cb65e40934428aad23ad56d596dc7/c.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"}]},{"title":"2026-W21-周报","href":"weekly-html/2026-W21-周报.html","summary":"\u003cstrong>全国学前教育宣传月启动\u003c/strong>：宣传月围绕“共同守护数字时代的童年”展开，幼教读物、亲子阅读和数字产品应突出儿童真实生活与陪伴。\u003ca href=\"https://epaper.gmw.cn/gmrb/html/content/202605/20/content_14331.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>","tags":"policy platform k12","sections":[{"heading":"一、K12教育政策全国盘点","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>全国学前教育宣传月启动\u003c/strong>：宣传月围绕“共同守护数字时代的童年”展开，幼教读物、亲子阅读和数字产品应突出儿童真实生活与陪伴。\u003ca href=\"https://epaper.gmw.cn/gmrb/html/content/202605/20/content_14331.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>防止“电子带娃”成为宣传重点\u003c/strong>：相关报道强调数字时代儿童保护，低龄内容产品应避免把屏幕互动替代亲子陪伴和真实游戏。\u003ca href=\"https://www.xinhuanet.com/20260519/808cb65e40934428aad23ad56d596dc7/c.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>多地义务招生进入集中办理期\u003c/strong>：无锡、青岛、长春等地招生节点叠加，区域内容应围绕官方报名、材料审核和派位规则展开。\u003ca href=\"https://yjrx.bjedu.cn\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"},{"heading":"二、K12教辅政策全国盘点","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>招生季进校园推广需隔离\u003c/strong>：阳光招生纪律下，教辅推广不得与报名、派位、分班和录取结果产生暗示关联。\u003ca href=\"http://www.moe.gov.cn/srcsite/A06/s3321/202604/t20260403_1432844.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>学前学籍管理带动园所信息化需求\u003c/strong>：学前“一人一号、籍随人走”口径强化后，园所信息化、材料管理和家园沟通内容需求上升。\u003ca href=\"http://www.moe.gov.cn/srcsite/A06/s3327/202604/t20260420_1434185.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"},{"heading":"三、出版社/教辅公司出版及数智化最新动态","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>政务招生平台承接家长流量\u003c/strong>：一网通办、入学服务平台和地方报名系统成为家长高频入口，商业教育 App 不应仿冒官方页面。\u003ca href=\"https://zwdt.sh.gov.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>教材正版数字化延续观察\u003c/strong>：AI 伴学和教材智能体类产品仍需关注版权授权、内容安全和进校园审查。\u003ca href=\"https://www.smartedu.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"},{"heading":"七、教育教辅政策解读文章","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>高招专业设置和招生制度专家解读\u003c/strong>：新华网围绕 2026 年高招专业设置、招生制度变化和考生选择提供专家解读，志愿类内容可据此更新专业说明和风险提示。\u003ca href=\"https://app.xinhuanet.com/news/article.html?articleId=ab6edda4bee1e5ce1a0e7a3bcc7c11a9\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"}]},{"title":"2026-W20-周报","href":"weekly-html/2026-W20-周报.html","summary":"\u003cstrong>招生季官方入口优先\u003c/strong>：义务教育入学办理进入集中咨询期，报名、材料审核和结果查询应以教育主管部门和官方平台为准。\u003ca href=\"https://yjrx.bjedu.cn\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>","tags":"policy platform k12","sections":[{"heading":"一、K12教育政策全国盘点","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>招生季官方入口优先\u003c/strong>：义务教育入学办理进入集中咨询期，报名、材料审核和结果查询应以教育主管部门和官方平台为准。\u003ca href=\"https://yjrx.bjedu.cn\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>学前教育宣传月进入启动前窗口\u003c/strong>：宣传月将围绕数字时代儿童保护展开，低龄读物和亲子阅读内容应提前完成合规表述检查。\u003ca href=\"http://www.moe.gov.cn/srcsite/A06/s3327/202604/t20260420_1434185.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>阳光招生地方落实持续推进\u003c/strong>：各地招生方案继续围绕免试就近、均衡分班、信息公开和一网通办展开，家长内容应避免制造择校焦虑。\u003ca href=\"http://www.moe.gov.cn/srcsite/A06/s3321/202604/t20260403_1432844.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"},{"heading":"二、K12教辅政策全国盘点","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>校外培训监管查询\u003c/strong>：教辅销售中的督学、直播答疑、训练营和 AI 诊断要明确服务属性，避免被包装为变相学科培训。\u003ca href=\"https://xwpx.eduyun.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>教材正版数字化边界\u003c/strong>：教材同步、智能体和伴学产品需要明确正版授权、数据安全和进校园合规，避免使用未经授权的教材封面和目录。\u003ca href=\"https://www.smartedu.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"},{"heading":"三、出版社/教辅公司出版及数智化最新动态","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>数字学习资源规范接入\u003c/strong>：学习资源、题库、阅读内容和教师备课材料应优先使用可核验的官方平台资源，并保留内容审核和纠错机制。\u003ca href=\"https://www.smartedu.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>书博会倒计时带动纸数融合准备\u003c/strong>：杭州书博会将成为教辅少儿、馆配和数字出版展示窗口，样书、二维码资源和线上转化入口需要提前联动。\u003ca href=\"http://www.xinhuanet.com/20260423/4784205cfd8a47debfbc4b95005c4228/c.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"},{"heading":"五、出版社/教辅公司与科技公司深度合作","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>教材智能体合作成为观察样本\u003c/strong>：出版单位与教育科技公司围绕正版教材内容、AI 伴学和学习硬件探索合作，传统教辅需评估版权和审校能力。\u003ca href=\"https://www.smartedu.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"}]},{"title":"2026-W19-周报","href":"weekly-html/2026-W19-周报.html","summary":"\u003cstrong>北京义务教育入学信息采集\u003c/strong>：北京义务教育入学服务平台承载信息采集、材料审核和结果查询，招生解读内容应统一指向官方入口。\u003ca href=\"https://yjrx.bjedu.cn\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>","tags":"policy platform k12","sections":[{"heading":"一、K12教育政策全国盘点","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>北京义务教育入学信息采集\u003c/strong>：北京义务教育入学服务平台承载信息采集、材料审核和结果查询，招生解读内容应统一指向官方入口。\u003ca href=\"https://yjrx.bjedu.cn\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>上海入学办理转向政务平台\u003c/strong>：上海入学、入园相关办理持续依托“一网通办”等政务入口，家长服务内容应聚焦时间节点、材料清单和官方查询路径。\u003ca href=\"https://zwdt.sh.gov.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>本科专业目录更新外溢到高中升学内容\u003c/strong>：专业目录变化会影响高中生涯规划、选科指导和志愿内容，历史版本专业名称需要统一校验。\u003ca href=\"http://www.moe.gov.cn/jyb_xwfb/gzdt_gzdt/s5987/202604/t20260428_1435016.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"},{"heading":"二、K12教辅政策全国盘点","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>AI 教育行动计划影响教辅数字化\u003c/strong>：AI 教辅功能、数据合规、内容审核和教学有效性证据需要成为产品上架前的基本检查项。\u003ca href=\"http://www.moe.gov.cn/srcsite/A16/s3342/202604/t20260410_1433240.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>招生办理类内容进入高风险窗口\u003c/strong>：上海、北京等地报名和材料审核叠加，家长 FAQ 可以做，但不得传播非官方入口或入学承诺。\u003ca href=\"https://yjrx.bjedu.cn\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"},{"heading":"三、出版社/教辅公司出版及数智化最新动态","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>国家智慧教育平台资源入口\u003c/strong>：K12 数字资源、教师备课、课后学习和家庭学习服务应优先引用国家智慧教育平台等可核验入口。\u003ca href=\"https://www.smartedu.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>AI+教育推动平台能力升级\u003c/strong>：区域平台、数字教材和教辅工具应围绕数据安全、内容审核、场景落地和教师培训形成完整方案。\u003ca href=\"http://www.moe.gov.cn/srcsite/A16/s3342/202604/t20260410_1433240.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"},{"heading":"五、出版社/教辅公司与科技公司深度合作","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>出版与 AI 平台合作需要审校链路\u003c/strong>：教参、题库、课堂诊断和教师工具可探索 AI 合作，但生成内容必须保留人工审校、版权检查和纠错机制。\u003ca href=\"http://www.moe.gov.cn/srcsite/A16/s3342/202604/t20260410_1433240.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"}]},{"title":"2026-W18-周报","href":"weekly-html/2026-W18-周报.html","summary":"\u003cstrong>普通高校本科专业目录更新\u003c/strong>：教育部发布 2026 年本科专业目录相关信息，升学规划、选科指导和高考志愿内容需要按新版专业口径更新。\u003ca href=\"http://www.moe.gov.cn/jyb_xwfb/gzdt_gzdt/s5987/202604/t20260428_1435016.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>","tags":"policy platform k12","sections":[{"heading":"一、K12教育政策全国盘点","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>普通高校本科专业目录更新\u003c/strong>：教育部发布 2026 年本科专业目录相关信息，升学规划、选科指导和高考志愿内容需要按新版专业口径更新。\u003ca href=\"http://www.moe.gov.cn/jyb_xwfb/gzdt_gzdt/s5987/202604/t20260428_1435016.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>阳光招生执行要求持续传导\u003c/strong>：义务教育和普通高中招生治理继续强化，家长内容应聚焦官方流程、报名材料和违规招生风险提醒。\u003ca href=\"http://www.moe.gov.cn/srcsite/A06/s3321/202604/t20260403_1432844.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>南京义务教育招生意见发布\u003c/strong>：南京招生文件明确报名、派位和入学安排，区域招生 FAQ 可围绕官方时间轴与材料清单展开。\u003ca href=\"https://www.nanjing.gov.cn/zgnjsjb/jrtt/202604/t20260430_5832758.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"},{"heading":"二、K12教辅政策全国盘点","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>心理健康读本带动配套内容需求\u003c/strong>：心理健康主题从活动化走向课程化，配套读物和教师资源需要加强专业审校和适龄表达。\u003ca href=\"https://www.smartedu.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>招生季教辅营销边界\u003c/strong>：阳光招生要求下，教辅、测评和训练营不得暗示择校、分班优势或入学资格绑定。\u003ca href=\"http://www.moe.gov.cn/srcsite/A06/s3321/202604/t20260403_1432844.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"},{"heading":"三、出版社/教辅公司出版及数智化最新动态","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>志愿类内容进入目录修订窗口\u003c/strong>：新版本科专业目录会影响专业百科、志愿指南和生涯教育内容，出版端需要建立可追溯的专业名称和培养方向更新表。\u003ca href=\"http://www.moe.gov.cn/jyb_xwfb/gzdt_gzdt/s5987/202604/t20260428_1435016.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>国家智慧教育平台能力扩围\u003c/strong>：K12 平台和教辅数字资源应优先对接官方资源、数据治理和教师使用场景，而不是只堆题库数量。\u003ca href=\"https://www.smartedu.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"},{"heading":"五、出版社/教辅公司与科技公司深度合作","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>出版与 AI 技术合作升温\u003c/strong>：AI 课程、融合出版和教学资源工具可作为出版机构合作方向，但题源、版权和未成年人保护需要前置审核。\u003ca href=\"https://www.smartedu.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"}]},{"title":"2026-W17-周报","href":"weekly-html/2026-W17-周报.html","summary":"\u003cstrong>2026 年全国学前教育宣传月部署\u003c/strong>：教育部明确宣传月主题为“共同守护数字时代的童年”，低龄内容应突出真实游戏、亲子陪伴和儿童保护。\u003ca href=\"http://www.moe.gov.cn/srcsite/A06/s3327/202604/t20260420_1434185.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>","tags":"policy platform k12","sections":[{"heading":"一、K12教育政策全国盘点","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>2026 年全国学前教育宣传月部署\u003c/strong>：教育部明确宣传月主题为“共同守护数字时代的童年”，低龄内容应突出真实游戏、亲子陪伴和儿童保护。\u003ca href=\"http://www.moe.gov.cn/srcsite/A06/s3327/202604/t20260420_1434185.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>上海义务教育招生执行期\u003c/strong>：上海及区级招生细则落地，家长服务内容应围绕免试就近、报名流程、材料核验和信息公开展开。\u003ca href=\"https://zwdt.sh.gov.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>南京义务教育招生意见发布\u003c/strong>：南京公布招生入学工作安排，电脑派位、热点校报名和时间节点成为区域 FAQ 的重点内容。\u003ca href=\"https://www.nanjing.gov.cn/zgnjsjb/jrtt/202604/t20260430_5832758.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"},{"heading":"二、K12教辅政策全国盘点","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>学前内容商业推广边界\u003c/strong>：宣传月通知强调不得借活动名义进行商业推销，幼教读物、幼小衔接资料和数字内容推广需要与公益宣传区分清楚。\u003ca href=\"http://www.moe.gov.cn/srcsite/A06/s3327/202604/t20260420_1434185.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>区域教材教辅用纸采购前置\u003c/strong>：秋季教材教辅印制进入供应链准备窗口，纸张、印制排期和交付周期需要提前锁定。\u003ca href=\"http://www.xinhuanet.com/20260423/4784205cfd8a47debfbc4b95005c4228/c.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"},{"heading":"三、出版社/教辅公司出版及数智化最新动态","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>第 34 届全国书博会定档杭州\u003c/strong>：全国图书交易博览会明确杭州主会场和分会场安排，教辅少儿、馆配和数字出版产品可提前准备展示书目与线上转化入口。\u003ca href=\"http://www.xinhuanet.com/20260423/4784205cfd8a47debfbc4b95005c4228/c.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>国家智慧教育平台资源入口\u003c/strong>：K12 数字资源、教师备课、课后学习和家庭学习服务应优先引用国家智慧教育平台等可核验入口。\u003ca href=\"https://www.smartedu.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"},{"heading":"五、出版社/教辅公司与科技公司深度合作","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>教材 IP 文旅融合延续关注\u003c/strong>：出版品牌与文旅场景结合可带动研学和阅读活动，但应区分教材内容使用、研学服务和商业文创边界。\u003ca href=\"https://www.smartedu.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"}]}]</script>
  <script>
    const WEEKLY_DATA = JSON.parse(document.getElementById('weekly-data').textContent);
    (function () {
      const weekSelect = document.getElementById('weekSelect');
      const meta = document.getElementById('boardMeta');
      const panels = document.getElementById('boardPanels');
      let active = 0;

      function esc(s) {
        return String(s == null ? '' : s)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      function renderWeekSelect() {
        if (!WEEKLY_DATA.length) {
          weekSelect.innerHTML = '';
          weekSelect.disabled = true;
          var wrap = document.getElementById('weekPickerWrap');
          if (wrap && !wrap.querySelector('.muted-empty')) {
            var sp = document.createElement('span');
            sp.className = 'muted muted-empty';
            sp.textContent = '暂无周报数据';
            wrap.appendChild(sp);
          }
          return;
        }
        weekSelect.disabled = false;
        weekSelect.innerHTML = WEEKLY_DATA.map(function (w, i) {
          return '<option value="' + i + '">' + esc(w.title) + '</option>';
        }).join('');
        weekSelect.value = String(active);
        weekSelect.addEventListener('change', function () {
          active = +weekSelect.value;
          if (!Number.isFinite(active) || active < 0 || active >= WEEKLY_DATA.length) active = 0;
          renderBoard();
        });
      }

      function renderBoard() {
        var w = WEEKLY_DATA[active];
        if (!w) {
          meta.innerHTML = '';
          panels.innerHTML = '<p class="muted">无数据</p>';
          return;
        }
        meta.innerHTML =
          '<p class="board-lead">' +
          w.summary +
          '</p><a class="link-full" href="' +
          esc(w.href) +
          '">查看完整周报 →</a>';
        if (!w.sections || !w.sections.length) {
          panels.innerHTML = '<p class="muted">本周期 Markdown 中暂无「##」分节，请直接打开完整周报。</p>';
          return;
        }
        panels.innerHTML = w.sections
          .map(function (s) {
            return (
              '<section class="panel"><h3 class="panel-title">' +
              esc(s.heading) +
              '</h3><div class="panel-body">' +
              s.bodyHtml +
              '</div></section>'
            );
          })
          .join('');
      }

      renderWeekSelect();
      renderBoard();

    })();
  </script>
