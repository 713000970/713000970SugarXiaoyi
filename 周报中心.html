i.com.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>","tags":"policy platform k12","sections":[{"heading":"一、K12教育政策","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>高招服务转入录取查询阶段\u003c/strong>：志愿服务重点从填报操作转向录取状态、征集志愿、退档原因和通知书防伪，所有入口应指向官方平台。\u003ca href=\"https://gaokao.chsi.com.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>暑期校外培训监管查询\u003c/strong>：暑期训练营、AI 自习、督学答疑和教辅配套服务需要与学科培训区分清楚，家长可通过监管平台核验机构信息。\u003ca href=\"https://xwpx.eduyun.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>省级录取查询入口优先\u003c/strong>：录取结果、征集志愿和投档信息应以省级教育考试院、阳光高考和高校招生网为准，第三方平台只做提醒和解释。\u003ca href=\"https://www.jseea.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"},{"heading":"二、K12教辅政策","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>暑期教辅配套服务合规边界\u003c/strong>：暑假作业、衔接一本通、错题诊断和直播答疑可以作为学习辅助，但不得承诺提分、保录或暗示入学资格。\u003ca href=\"https://xwpx.eduyun.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"},{"heading":"三、出版数智化","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>志愿类内容升级为录取期工具\u003c/strong>：志愿指南和小程序应补充录取状态词典、征集志愿提醒、退档案例解释和官方入口聚合。\u003ca href=\"https://gaokao.chsi.com.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>数字学习资源进入暑期高频使用期\u003c/strong>：阅读、错题、复习计划和学习诊断类产品应优先引用官方可核验资源，并保留人工审校和纠错机制。\u003ca href=\"https://www.smartedu.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"}]},{"title":"2026-W27-周报","href":"weekly-html/2026-W27-周报.html","summary":"\u003cstrong>江苏志愿正式填报进入关键期\u003c/strong>：江苏本科院校专业组志愿填报进入核心操作窗口，省版志愿指南、专业组速查和客服 FAQ 需要每日同步官方规则。\u003ca href=\"https://www.jseea.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>","tags":"policy platform k12","sections":[{"heading":"一、K12教育政策","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>江苏志愿正式填报进入关键期\u003c/strong>：江苏本科院校专业组志愿填报进入核心操作窗口，省版志愿指南、专业组速查和客服 FAQ 需要每日同步官方规则。\u003ca href=\"https://www.jseea.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>阳光高考平台承接正式填报服务\u003c/strong>：院校招生章程、专业信息、咨询答疑和官方提醒应作为志愿类内容的基础入口。\u003ca href=\"https://gaokao.chsi.com.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"},{"heading":"二、K12教辅政策","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>暑期教辅服务合规边界\u003c/strong>：暑假衔接、督学打卡、AI 诊断和线上答疑应明确图书资料、数字服务和培训服务的区别。\u003ca href=\"https://xwpx.eduyun.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"},{"heading":"三、出版数智化","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>志愿产品进入省别规则维护期\u003c/strong>：院校库、专业库、历年录取数据和 AI 问答应按省份更新，并提示所有结果以省考试院和高校招生网为准。\u003ca href=\"https://gaokao.chsi.com.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>暑期数字资源进入家庭学习场景\u003c/strong>：阅读打卡、错题复盘和学习计划类服务应优先接入官方可核验资源，并保留人工审校与纠错机制。\u003ca href=\"https://www.smartedu.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"}]},{"title":"2026-W26-周报","href":"weekly-html/2026-W26-周报.html","summary":"\u003cstrong>高招志愿进入分省填报高峰\u003c/strong>：各省考试院和阳光高考承接查分、志愿填报、招生章程和咨询服务，教辅内容必须按省份拆分规则。\u003ca href=\"https://gaokao.chsi.com.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>","tags":"policy platform k12","sections":[{"heading":"一、K12教育政策","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>高招志愿进入分省填报高峰\u003c/strong>：各省考试院和阳光高考承接查分、志愿填报、招生章程和咨询服务，教辅内容必须按省份拆分规则。\u003ca href=\"https://gaokao.chsi.com.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>省级考试院入口优先\u003c/strong>：查分、志愿填报和录取查询均应指向省级教育考试院或阳光高考平台，避免传播非官方时间表和查分链接。\u003ca href=\"https://www.jseea.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"},{"heading":"三、出版数智化","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>省级考试院平台访问高峰\u003c/strong>：志愿类数字产品要聚合官方入口、提醒填报节点并说明辅助属性，不应仿冒考试院页面或截留账号信息。\u003ca href=\"https://www.jseea.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>暑期数字资源转入家庭使用场景\u003c/strong>：阅读打卡、错题复盘、学习计划和教师资源应优先使用官方可核验内容，并保留人工审核机制。\u003ca href=\"https://www.smartedu.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"}]},{"title":"2026-W25-周报","href":"weekly-html/2026-W25-周报.html","summary":"\u003cstrong>江苏模拟填报进入操作期\u003c/strong>：江苏考生服务平台承担模拟填报和后续正式填报，志愿内容应按省考试院口径解释登录、批次和专业组规则。\u003ca href=\"https://www.jseea.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>","tags":"policy platform k12","sections":[{"heading":"一、K12教育政策","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>江苏模拟填报进入操作期\u003c/strong>：江苏考生服务平台承担模拟填报和后续正式填报，志愿内容应按省考试院口径解释登录、批次和专业组规则。\u003ca href=\"https://www.jseea.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>多省高招服务转向省级考试院入口\u003c/strong>：高考成绩、批次线、志愿填报和录取信息需要分省维护，第三方内容不得替代官方入口。\u003ca href=\"https://gaokao.chsi.com.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"},{"heading":"三、出版数智化","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>志愿工具需要明确辅助定位\u003c/strong>：志愿小程序、院校库和专业测评工具应标明数据来源和更新时间，避免“精准预测”“保录”等承诺。\u003ca href=\"https://gaokao.chsi.com.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>暑期数字资源开始预热\u003c/strong>：阅读、复习、错题和学习计划类产品应优先接入国家智慧教育平台等官方资源，减少不明来源资料包。\u003ca href=\"https://www.smartedu.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"}]},{"title":"2026-W24-周报","href":"weekly-html/2026-W24-周报.html","summary":"\u003cstrong>江苏高考志愿填报安排公布\u003c/strong>：江苏明确模拟填报、正式填报和院校专业组模式，省版志愿指南和 FAQ 需要独立维护。\u003ca href=\"https://finance.sina.com.cn/wm/2026-06-11/doc-iniazpqr4015911.shtml\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>","tags":"policy platform k12","sections":[{"heading":"一、K12教育政策","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>江苏高考志愿填报安排公布\u003c/strong>：江苏明确模拟填报、正式填报和院校专业组模式，省版志愿指南和 FAQ 需要独立维护。\u003ca href=\"https://finance.sina.com.cn/wm/2026-06-11/doc-iniazpqr4015911.shtml\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>阳光高考入口承接考后服务\u003c/strong>：考后查分、志愿、招生章程和录取信息应优先引导至阳光高考及各省考试院官方渠道。\u003ca href=\"https://gaokao.chsi.com.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"},{"heading":"三、出版数智化","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>省级志愿平台进入高频使用期\u003c/strong>：志愿类数字产品应按省份维护数据来源、更新时间、院校专业组规则和免责声明。\u003ca href=\"https://finance.sina.com.cn/wm/2026-06-11/doc-iniazpqr4015911.shtml\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>智慧教育平台资源可作为暑期入口\u003c/strong>：暑期学习、阅读和复习资源应优先接入国家智慧教育平台等官方可核验入口。\u003ca href=\"https://www.smartedu.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"}]},{"title":"2026-W23-周报","href":"weekly-html/2026-W23-周报.html","summary":"\u003cstrong>2026 年高考护航行动启动\u003c/strong>：教育部会同有关部门强化考试安全、涉考诈骗治理和志愿填报服务，教辅和自媒体内容不得使用押题、泄题、内部渠道等表述。\u003ca href=\"http://www.moe.gov.cn/jyb_xwfb/gzdt_gzdt/s5987/202606/t20260602_1438553.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>","tags":"policy k12","sections":[{"heading":"一、K12教育政策","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>2026 年高考护航行动启动\u003c/strong>：教育部会同有关部门强化考试安全、涉考诈骗治理和志愿填报服务，教辅和自媒体内容不得使用押题、泄题、内部渠道等表述。\u003ca href=\"http://www.moe.gov.cn/jyb_xwfb/gzdt_gzdt/s5987/202606/t20260602_1438553.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>高招专业调整带动升学内容更新\u003c/strong>：高校专业设置和招生变化推动志愿指南、专业百科和生涯规划内容更新，新增专业解释要与官方口径一致。\u003ca href=\"http://www.news.cn/edu/20260605/98f91d1540c8483cbea70c5a4764d8d8/c.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>深圳龙华义务招生通知发布\u003c/strong>：龙华区小一和初一报名安排明确，区域招生 FAQ 应围绕招生范围、材料清单、初审复核和录取节点更新。\u003ca href=\"https://www.sz.gov.cn/school/tzgg/content/post_12826935.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"},{"heading":"三、出版数智化","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>阳光志愿服务升级\u003c/strong>：高考护航行动提出优化志愿填报服务，第三方志愿工具应定位为信息整理和辅助解释，不得替代官方填报系统。\u003ca href=\"http://www.moe.gov.cn/jyb_xwfb/gzdt_gzdt/s5987/202606/t20260602_1438553.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"},{"heading":"七、政策解读","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>高考十问十答\u003c/strong>：高考问答明确智能设备、押题谣言、查分渠道和志愿服务注意事项，考后内容应统一引用官方和权威媒体口径。\u003ca href=\"https://www.163.com/dy/article/KULQ8IJL05346RC6.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"}]},{"title":"2026-W22-周报","href":"weekly-html/2026-W22-周报.html","summary":"\u003cstrong>深圳福田幼儿园集中招生\u003c/strong>：福田区幼儿园报名进入网上办理窗口，入园 FAQ 应围绕报名入口、材料核验、录取查询和官方公告更新。\u003ca href=\"https://www.szft.gov.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>","tags":"policy k12","sections":[{"heading":"一、K12教育政策","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>深圳福田幼儿园集中招生\u003c/strong>：福田区幼儿园报名进入网上办理窗口，入园 FAQ 应围绕报名入口、材料核验、录取查询和官方公告更新。\u003ca href=\"https://www.szft.gov.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>北京义务教育信息采集收官\u003c/strong>：北京入学信息采集进入月底收口阶段，家长服务内容应避免非官方入口和保录、择校暗示。\u003ca href=\"https://yjrx.bjedu.cn\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>上海入园入学线上办理\u003c/strong>：上海入园和入学办理继续依托政务服务入口，渠道侧应提供官方路径导航而不是替代办理服务。\u003ca href=\"https://zwdt.sh.gov.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"}]},{"title":"2026-W21-周报","href":"weekly-html/2026-W21-周报.html","summary":"\u003cstrong>全国学前教育宣传月启动\u003c/strong>：宣传月围绕“共同守护数字时代的童年”展开，幼教读物、亲子阅读和数字产品应突出儿童真实生活与陪伴。\u003ca href=\"https://epaper.gmw.cn/gmrb/html/content/202605/20/content_14331.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>","tags":"policy k12","sections":[{"heading":"一、K12教育政策","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>全国学前教育宣传月启动\u003c/strong>：宣传月围绕“共同守护数字时代的童年”展开，幼教读物、亲子阅读和数字产品应突出儿童真实生活与陪伴。\u003ca href=\"https://epaper.gmw.cn/gmrb/html/content/202605/20/content_14331.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>防止“电子带娃”成为宣传重点\u003c/strong>：相关报道强调数字时代儿童保护，低龄内容产品应避免把屏幕互动替代亲子陪伴和真实游戏。\u003ca href=\"https://www.xinhuanet.com/20260519/808cb65e40934428aad23ad56d596dc7/c.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"},{"heading":"七、政策解读","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>高招专业设置和招生制度专家解读\u003c/strong>：新华网围绕 2026 年高招专业设置、招生制度变化和考生选择提供专家解读，志愿类内容可据此更新专业说明和风险提示。\u003ca href=\"https://app.xinhuanet.com/news/article.html?articleId=ab6edda4bee1e5ce1a0e7a3bcc7c11a9\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"}]},{"title":"2026-W20-周报","href":"weekly-html/2026-W20-周报.html","summary":"\u003cstrong>招生季官方入口优先\u003c/strong>：义务教育入学办理进入集中咨询期，报名、材料审核和结果查询应以教育主管部门和官方平台为准。\u003ca href=\"https://yjrx.bjedu.cn\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>","tags":"policy platform k12","sections":[{"heading":"一、K12教育政策","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>招生季官方入口优先\u003c/strong>：义务教育入学办理进入集中咨询期，报名、材料审核和结果查询应以教育主管部门和官方平台为准。\u003ca href=\"https://yjrx.bjedu.cn\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"},{"heading":"二、K12教辅政策","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>校外培训监管查询\u003c/strong>：教辅销售中的督学、直播答疑、训练营和 AI 诊断要明确服务属性，避免被包装为变相学科培训。\u003ca href=\"https://xwpx.eduyun.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"},{"heading":"三、出版数智化","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>数字学习资源规范接入\u003c/strong>：学习资源、题库、阅读内容和教师备课材料应优先使用可核验的官方平台资源，并保留内容审核和纠错机制。\u003ca href=\"https://www.smartedu.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"}]},{"title":"2026-W19-周报","href":"weekly-html/2026-W19-周报.html","summary":"\u003cstrong>北京义务教育入学信息采集\u003c/strong>：北京义务教育入学服务平台承载信息采集、材料审核和结果查询，招生解读内容应统一指向官方入口。\u003ca href=\"https://yjrx.bjedu.cn\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>","tags":"policy platform k12","sections":[{"heading":"一、K12教育政策","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>北京义务教育入学信息采集\u003c/strong>：北京义务教育入学服务平台承载信息采集、材料审核和结果查询，招生解读内容应统一指向官方入口。\u003ca href=\"https://yjrx.bjedu.cn\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>上海入学办理转向政务平台\u003c/strong>：上海入学、入园相关办理持续依托“一网通办”等政务入口，家长服务内容应聚焦时间节点、材料清单和官方查询路径。\u003ca href=\"https://zwdt.sh.gov.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"},{"heading":"三、出版数智化","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>国家智慧教育平台资源入口\u003c/strong>：K12 数字资源、教师备课、课后学习和家庭学习服务应优先引用国家智慧教育平台等可核验入口。\u003ca href=\"https://www.smartedu.cn/\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"}]},{"title":"2026-W18-周报","href":"weekly-html/2026-W18-周报.html","summary":"\u003cstrong>普通高校本科专业目录更新\u003c/strong>：教育部发布 2026 年本科专业目录相关信息，升学规划、选科指导和高考志愿内容需要按新版专业口径更新。\u003ca href=\"http://www.moe.gov.cn/jyb_xwfb/gzdt_gzdt/s5987/202604/t20260428_1435016.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>","tags":"policy k12","sections":[{"heading":"一、K12教育政策","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>普通高校本科专业目录更新\u003c/strong>：教育部发布 2026 年本科专业目录相关信息，升学规划、选科指导和高考志愿内容需要按新版专业口径更新。\u003ca href=\"http://www.moe.gov.cn/jyb_xwfb/gzdt_gzdt/s5987/202604/t20260428_1435016.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003cli>\u003cstrong>南京义务教育招生意见发布\u003c/strong>：南京公布义务教育招生入学工作安排，电脑派位、报名节点和信息公开要求成为家长 FAQ 的重点内容。\u003ca href=\"https://www.nanjing.gov.cn/zgnjsjb/jrtt/202604/t20260430_5832758.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"},{"heading":"三、出版数智化","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>志愿类内容进入目录修订窗口\u003c/strong>：新版本科专业目录会影响专业百科、志愿指南和生涯教育内容，出版端需要建立可追溯的专业名称和培养方向更新表。\u003ca href=\"http://www.moe.gov.cn/jyb_xwfb/gzdt_gzdt/s5987/202604/t20260428_1435016.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"}]},{"title":"2026-W17-周报","href":"weekly-html/2026-W17-周报.html","summary":"\u003cstrong>2026 年全国学前教育宣传月部署\u003c/strong>：教育部明确宣传月主题为“共同守护数字时代的童年”，幼教内容和低龄数字产品应突出真实游戏、亲子陪伴和儿童保护。\u003ca href=\"http://www.moe.gov.cn/srcsite/A06/s3327/202604/t20260420_1434185.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>","tags":"policy k12","sections":[{"heading":"一、K12教育政策","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>2026 年全国学前教育宣传月部署\u003c/strong>：教育部明确宣传月主题为“共同守护数字时代的童年”，幼教内容和低龄数字产品应突出真实游戏、亲子陪伴和儿童保护。\u003ca href=\"http://www.moe.gov.cn/srcsite/A06/s3327/202604/t20260420_1434185.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"},{"heading":"二、K12教辅政策","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>学前内容商业推广边界\u003c/strong>：宣传月通知强调不得借活动名义进行商业推销，低龄读物、幼小衔接资料和数字内容推广需要与公益宣传区分清楚。\u003ca href=\"http://www.moe.gov.cn/srcsite/A06/s3327/202604/t20260420_1434185.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"},{"heading":"三、出版数智化","bodyHtml":"\u003cul>\n\u003cli>\u003cstrong>第 34 届全国书博会定档杭州\u003c/strong>：全国图书交易博览会明确杭州主会场和分会场安排，教辅少儿、馆配和数字出版产品可提前准备展示书目与线上转化入口。\u003ca href=\"http://www.xinhuanet.com/20260423/4784205cfd8a47debfbc4b95005c4228/c.html\" target=\"_blank\" rel=\"noopener noreferrer\">原文\u003c/a>\n\u003c/li>\u003c/ul>"}]}]</script>
  <script>
    const WEEKLY_DATA = JSON.parse(document.getElementById('weekly-data').textContent);
    (function () {
      const weekSelect = document.getElementById('weekSelect');
      const meta = document.getElementById('boardMeta');
      const panels = document.getElementById('boardPanels');
      let active = 0;

      function esc(s) {
        return String(s == null ? '' : s)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      function renderWeekSelect() {
        if (!WEEKLY_DATA.length) {
          weekSelect.innerHTML = '';
          weekSelect.disabled = true;
          var wrap = document.getElementById('weekPickerWrap');
          if (wrap && !wrap.querySelector('.muted-empty')) {
            var sp = document.createElement('span');
            sp.className = 'muted muted-empty';
            sp.textContent = '暂无周报数据';
            wrap.appendChild(sp);
          }
          return;
        }
        weekSelect.disabled = false;
        weekSelect.innerHTML = WEEKLY_DATA.map(function (w, i) {
          return '<option value="' + i + '">' + esc(w.title) + '</option>';
        }).join('');
        weekSelect.value = String(active);
        weekSelect.addEventListener('change', function () {
          active = +weekSelect.value;
          if (!Number.isFinite(active) || active < 0 || active >= WEEKLY_DATA.length) active = 0;
          renderBoard();
        });
      }

      function renderBoard() {
        var w = WEEKLY_DATA[active];
        if (!w) {
          meta.innerHTML = '';
          panels.innerHTML = '<p class="muted">无数据</p>';
          return;
        }
        meta.innerHTML =
          '<p class="board-lead">' +
          w.summary +
          '</p><a class="link-full" href="' +
          esc(w.href) +
          '">查看完整周报 →</a>';
        if (!w.sections || !w.sections.length) {
          panels.innerHTML = '<p class="muted">本周期 Markdown 中暂无「##」分节，请直接打开完整周报。</p>';
          return;
        }
        panels.innerHTML = w.sections
          .map(function (s) {
            return (
              '<section class="panel"><h3 class="panel-title">' +
              esc(s.heading) +
              '</h3><div class="panel-body">' +
              s.bodyHtml +
              '</div></section>'
            );
          })
          .join('');
      }

      renderWeekSelect();
      renderBoard();

    })();
  </script>
